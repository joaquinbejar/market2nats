name: Run Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - 'release/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  unit_tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y make pkg-config

      - name: Run unit tests
        run: make test

  integration_tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y make pkg-config

      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats-test \
            --network host \
            nats:2.10-alpine \
            -js

      - name: Wait for NATS JetStream to be ready
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost 4222 2>/dev/null; then
              echo "NATS is ready"
              docker logs nats-test 2>&1 | tail -5
              exit 0
            fi
            sleep 1
          done
          echo "NATS did not start"
          docker logs nats-test 2>&1
          exit 1

      - name: Run integration tests
        run: make integration-test
        env:
          NATS_URL: nats://localhost:4222

      - name: Stop NATS
        if: always()
        run: docker stop nats-test && docker rm nats-test
