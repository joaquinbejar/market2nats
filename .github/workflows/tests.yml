name: Run Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - 'release/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  unit_tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y make pkg-config protobuf-compiler

      - name: Run unit tests
        run: make test

  integration_tests:
    runs-on: ubuntu-latest

    services:
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
        options: >-
          --health-cmd "true"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 10
          --health-start-period 5s
        env:
          NATS_CONFIG: "-js"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y make pkg-config protobuf-compiler

      - name: Run integration tests
        run: make integration-test
        env:
          NATS_URL: nats://localhost:4222
