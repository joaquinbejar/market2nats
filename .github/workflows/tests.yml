name: Run Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - 'release/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  unit_tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y make pkg-config

      - name: Run unit tests
        run: make test

  integration_tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y make pkg-config

      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats-test \
            -p 4222:4222 \
            nats:2.10-alpine \
            --jetstream --store_dir /data --max_payload 1048576

      - name: Wait for NATS to be ready
        run: |
          for i in $(seq 1 30); do
            nc -z localhost 4222 && echo "NATS is ready" && exit 0
            sleep 1
          done
          echo "NATS did not start" && exit 1

      - name: Run integration tests
        run: make integration-test
        env:
          NATS_URL: nats://localhost:4222

      - name: Stop NATS
        if: always()
        run: docker stop nats-test && docker rm nats-test
