services:
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    command: >
      --jetstream
      --store_dir /data
      --http_port 8222
      --max_payload 1048576
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 2s

  market2nats:
    build:
      context: ..
      dockerfile: Docker/market2nats.Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222

  oracle:
    build:
      context: ..
      dockerfile: Docker/oracle.Dockerfile
    ports:
      - "9091:9091"
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222

volumes:
  nats-data:
