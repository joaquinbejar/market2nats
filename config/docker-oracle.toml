#
# oracle — Docker config
#
# Uses NATS_URL env var for the connection URL (with embedded credentials):
#   NATS_URL=nats://user:password@host:4222
#

[service]
name = "oracle"
log_level = "info"
log_format = "json"
http_port = 9091

[nats]
urls = ["${NATS_URL}"]

[[subscriptions]]
symbol = "BTC/USDT"
subjects = [
  "market.binance.btc-usdt.trade",
]

[[subscriptions]]
symbol = "ETH/USDT"
subjects = [
  "market.binance.eth-usdt.trade",
]

[pipeline]
strategy = "median_filtered"
staleness_max_ms = 10000
outlier_max_deviation_bps = 100
min_sources = 1
twap_window_ms = 30000

[publish]
subject_pattern = "oracle.<symbol_normalized>"
format = "json"
publish_interval_ms = 1000
