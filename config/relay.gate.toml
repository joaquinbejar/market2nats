#
# market2nats — Gate.io v4 (spot + USDT perps)
#
# Gate.io v4 profile. Uses subscribe_template to send one subscribe frame per
# (instrument, channel) pair. The venue accepts single-element payloads
# which the existing generic_ws subscribe_template path already supports.
#
#
#
# Endpoints:
#   - Spot   : wss://api.gateio.ws/ws/v4/
#   - Futures: wss://fx-ws.gateio.ws/v4/ws/usdt   (linear USDT perps)
#
# Subscribe shape — spot:
#   {"time":<unix>,"channel":"spot.trades","event":"subscribe","payload":["BTC_USDT","ETH_USDT"]}
# Subscribe shape — futures:
#   {"time":<unix>,"channel":"futures.trades","event":"subscribe","payload":["BTC_USDT","ETH_USDT"]}
#
# NATS subjects produced (once the parser tweak lands):
#   market.gate.btc-usdt.trade|ticker|l2_orderbook
#   market.gate-futures.btc-usdt.trade|ticker|l2_orderbook|funding_rate|liquidation

[service]
name = "market2nats-gate"
log_level = "info"
log_format = "json"
shutdown_timeout_ms = 5000

[serialization]
format = "json"

[nats]
urls = ["nats://localhost:4222"]
connect_timeout_ms = 5000
reconnect_buffer_size = 8388608
max_reconnects = -1
ping_interval_secs = 20
auth = "userpass"
username = "${NATS_USER}"
password = "${NATS_PASSWORD}"

[nats.tls]
enabled = false

# ── Streams ──────────────────────────────────

[[nats.streams]]
name = "MARKET_TRADES"
subjects = ["market.gate.*.trade", "market.gate-futures.*.trade"]
storage = "file"
retention = "limits"
max_age_secs = 86400
max_bytes = 1073741824
max_msg_size = 65536
discard = "old"
num_replicas = 1
duplicate_window_secs = 120

[[nats.streams]]
name = "MARKET_TICKER_GATE"
subjects = ["market.gate.*.ticker", "market.gate-futures.*.ticker"]
storage = "memory"
retention = "limits"
max_age_secs = 300
num_replicas = 1

[[nats.streams]]
name = "MARKET_ORDERBOOK_GATE"
subjects = ["market.gate.*.l2_orderbook", "market.gate-futures.*.l2_orderbook"]
storage = "file"
retention = "limits"
max_age_secs = 3600
max_bytes = 5368709120
num_replicas = 1

[[nats.streams]]
name = "MARKET_FUNDING_GATE"
subjects = ["market.gate-futures.*.funding_rate"]
storage = "file"
retention = "limits"
max_age_secs = 604800
num_replicas = 1

[[nats.streams]]
name = "MARKET_LIQUIDATIONS_GATE"
subjects = ["market.gate-futures.*.liquidation"]
storage = "file"
retention = "interest"
max_age_secs = 86400
num_replicas = 1

# ── Gate.io Spot ─────────────────────────────

[[venues]]
id = "gate"
adapter = "generic_ws"
enabled = true

[venues.connection]
ws_url = "wss://api.gateio.ws/ws/v4/"
reconnect_delay_ms = 1000
max_reconnect_delay_ms = 60000
max_reconnect_attempts = 0
ping_interval_secs = 25
pong_timeout_secs = 10

[venues.circuit_breaker]
failure_threshold = 5
reset_timeout_secs = 60
half_open_max_requests = 2

[venues.generic_ws]
# subscribe_template sends one frame per (instrument, channel) pair.
# Gate.io accepts this format with a single-element payload array.
# For native multi-instrument batching, a per-channel mode is tracked as a follow-up.
subscribe_template = '{"time":0,"channel":"${channel}","event":"subscribe","payload":["${instrument}"]}'
stream_format = "${channel}"
message_format = "json"

[venues.generic_ws.channel_map]
trade = "spot.trades"
ticker = "spot.book_ticker"
# spot.order_book_update ships diffs; spot.order_book is 100-level snapshots.
l2_orderbook = "spot.order_book_update"

[[venues.subscriptions]]
instrument = "BTC_USDT"
canonical_symbol = "BTC/USDT"
data_types = ["trade", "ticker", "l2_orderbook"]

[[venues.subscriptions]]
instrument = "ETH_USDT"
canonical_symbol = "ETH/USDT"
data_types = ["trade", "ticker", "l2_orderbook"]

# ── Gate.io USDT Perpetual Futures ───────────

[[venues]]
id = "gate-futures"
adapter = "generic_ws"
enabled = true

[venues.connection]
ws_url = "wss://fx-ws.gateio.ws/v4/ws/usdt"
reconnect_delay_ms = 1000
max_reconnect_delay_ms = 60000
max_reconnect_attempts = 0
ping_interval_secs = 25
pong_timeout_secs = 10

[venues.circuit_breaker]
failure_threshold = 5
reset_timeout_secs = 60
half_open_max_requests = 2

[venues.generic_ws]
subscribe_template = '{"time":0,"channel":"${channel}","event":"subscribe","payload":["${instrument}"]}'
stream_format = "${channel}"
message_format = "json"

[venues.generic_ws.channel_map]
trade = "futures.trades"
ticker = "futures.book_ticker"
l2_orderbook = "futures.order_book_update"
# futures.tickers includes funding_rate and mark_price fields — parser tap needed.
funding_rate = "futures.tickers"
# Gate.io publishes forced liquidations via futures.liquidates.
liquidation = "futures.liquidates"

[[venues.subscriptions]]
instrument = "BTC_USDT"
canonical_symbol = "BTC/USDT"
data_types = ["trade", "ticker", "l2_orderbook", "funding_rate", "liquidation"]

[[venues.subscriptions]]
instrument = "ETH_USDT"
canonical_symbol = "ETH/USDT"
data_types = ["trade", "ticker", "l2_orderbook", "funding_rate", "liquidation"]
