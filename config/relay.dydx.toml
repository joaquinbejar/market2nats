#
# market2nats — dYdX v4 Indexer (on-chain perpetuals)
#
# Parser-tweak profile. dYdX v4 uses a per-channel subscribe model:
#
#   {"type":"subscribe","channel":"v4_trades","id":"BTC-USD"}
#   {"type":"subscribe","channel":"v4_orderbook","id":"BTC-USD"}
#   {"type":"subscribe","channel":"v4_markets"}
#
# One subscribe frame per (channel, id) pair, with `id` being the market
# name for per-market channels or absent for global ones like v4_markets.
# Generic_ws's non-batch subscribe_template handles the per-market shape;
# the markets channel is a separate case (no `id`).
#
# Incoming messages carry `type: "subscribed" | "channel_data" | "channel_batch_data"`
# with the channel and id in the envelope, which the parser must route.
#
# Endpoint: wss://indexer.dydx.trade/v4/ws
#
# Supported canonical data types on dYdX v4:
#   trade          → v4_trades.{market}
#   ticker         → (no dedicated channel; derived from v4_markets updates)
#   l2_orderbook   → v4_orderbook.{market}
#   funding_rate   → v4_markets            (per-market funding rate
#                                            broadcast in the markets feed)
#   liquidation    → v4_trades (tapped: liquidation flag on trades)
#
# NATS subjects produced:
#   market.dydx.btc-usd.trade|l2_orderbook|funding_rate|liquidation
#   market.dydx.eth-usd.trade|l2_orderbook|funding_rate|liquidation

[service]
name = "market2nats-dydx"
log_level = "info"
log_format = "json"
shutdown_timeout_ms = 5000

[serialization]
format = "json"

[nats]
urls = ["${NATS_URL:-nats://localhost:4222}"]
connect_timeout_ms = 5000
reconnect_buffer_size = 8388608
max_reconnects = -1
ping_interval_secs = 20
auth = "userpass"
username = "${NATS_USER}"
password = "${NATS_PASSWORD}"

[nats.tls]
enabled = false

# ── Streams ──────────────────────────────────

[[nats.streams]]
name = "MARKET_TRADES"
subjects = ["market.dydx.*.trade"]
storage = "file"
retention = "limits"
max_age_secs = 86400
max_bytes = 1073741824
max_msg_size = 65536
discard = "old"
num_replicas = 1
duplicate_window_secs = 120

[[nats.streams]]
name = "MARKET_ORDERBOOK_DYDX"
subjects = ["market.dydx.*.l2_orderbook"]
storage = "file"
retention = "limits"
max_age_secs = 3600
max_bytes = 5368709120
num_replicas = 1

[[nats.streams]]
name = "MARKET_FUNDING_DYDX"
subjects = ["market.dydx.*.funding_rate"]
storage = "file"
retention = "limits"
max_age_secs = 604800
num_replicas = 1

[[nats.streams]]
name = "MARKET_LIQUIDATIONS_DYDX"
subjects = ["market.dydx.*.liquidation"]
storage = "file"
retention = "interest"
max_age_secs = 86400
num_replicas = 1

# ── dYdX v4 ──────────────────────────────────

[[venues]]
id = "dydx"
adapter = "generic_ws"
enabled = true

[venues.connection]
ws_url = "wss://indexer.dydx.trade/v4/ws"
reconnect_delay_ms = 1000
max_reconnect_delay_ms = 60000
max_reconnect_attempts = 0
ping_interval_secs = 25
pong_timeout_secs = 10

[venues.circuit_breaker]
failure_threshold = 5
reset_timeout_secs = 60
half_open_max_requests = 2

[venues.generic_ws]
# Per-market subscriptions use `id`. v4_markets has no id and must be
# sent once at startup — the parser tweak handles this distinction via
# a "global_channels" list.
subscribe_template = '{"type":"subscribe","channel":"${channel}","id":"${instrument}"}'
stream_format = "${channel}:${instrument}"
message_format = "json"

[venues.generic_ws.channel_map]
trade = "v4_trades"
l2_orderbook = "v4_orderbook"
# funding_rate and liquidation are parser taps rather than dedicated
# channels — they're synthesized from v4_markets and v4_trades updates.
funding_rate = "v4_markets"
liquidation = "v4_trades"

[[venues.subscriptions]]
instrument = "BTC-USD"
canonical_symbol = "BTC/USD"
data_types = ["trade", "l2_orderbook", "funding_rate", "liquidation"]

[[venues.subscriptions]]
instrument = "ETH-USD"
canonical_symbol = "ETH/USD"
data_types = ["trade", "l2_orderbook", "funding_rate", "liquidation"]
