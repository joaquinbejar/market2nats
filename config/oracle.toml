[service]
name = "oracle"
log_level = "info"
log_format = "json"
http_port = 9091

[nats]
urls = ["${NATS_URL:-nats://localhost:4222}"]

[[subscriptions]]
symbol = "BTC/USDT"
subjects = [
  "market.*.btc-usdt.trade",
]

[[subscriptions]]
symbol = "ETH/USDT"
subjects = [
  "market.*.eth-usdt.trade",
]

[pipeline]
strategy = "median_filtered"
staleness_max_ms = 10000
outlier_max_deviation_bps = 100
min_sources = 1
twap_window_ms = 30000

[publish]
subject_pattern = "oracle.<symbol_normalized>"
format = "json"
publish_interval_ms = 1000
