#
# market2nats — Kraken Futures (perpetuals)
#
# Parser-tweak profile. Kraken Futures uses a subscribe shape with
# "feed" (channel) and "product_ids" (array of contract ids):
#
#   {"event":"subscribe","feed":"trade","product_ids":["PI_XBTUSD","PI_ETHUSD"]}
#
# One frame per feed. Shares a generic_ws extension with Gate.io and
# Kraken Spot (per-channel frame, instruments as array inside the
# subscribe payload, different field names per venue).
#
# Endpoint: wss://futures.kraken.com/ws/v1
#
# Supported canonical data types:
#   trade          → trade
#   ticker         → ticker
#   l2_orderbook   → book
#   funding_rate   → ticker (tapped: funding_rate + funding_rate_prediction fields)
#   liquidation    → (inferred from trade channel's "type":"fill" with
#                     "fill_type":"liquidation" — parser tap needed)
#
# Symbol convention:
#   PI_XBTUSD  → BTC/USD perp inverse  (XBT = Bitcoin)
#   PI_ETHUSD  → ETH/USD perp inverse
#   PF_XBTUSD  → BTC/USD perp linear (USD-margined)
#   PF_ETHUSD  → ETH/USD perp linear
#
# Config uses PF_* (linear/USD-margined) for BTC and ETH; PI_* for
# reference if the linear pair is unavailable.
#
# NATS subjects produced:
#   market.kraken-futures.btc-usd.trade|ticker|l2_orderbook|funding_rate|liquidation
#   market.kraken-futures.eth-usd.trade|ticker|l2_orderbook|funding_rate|liquidation

[service]
name = "market2nats-kraken-futures"
log_level = "info"
log_format = "json"
shutdown_timeout_ms = 5000

[serialization]
format = "json"

[nats]
urls = ["${NATS_URL:-nats://localhost:4222}"]
connect_timeout_ms = 5000
reconnect_buffer_size = 8388608
max_reconnects = -1
ping_interval_secs = 20
auth = "userpass"
username = "${NATS_USER}"
password = "${NATS_PASSWORD}"

[nats.tls]
enabled = false

# ── Streams ──────────────────────────────────

[[nats.streams]]
name = "MARKET_TRADES"
subjects = ["market.kraken-futures.*.trade"]
storage = "file"
retention = "limits"
max_age_secs = 86400
max_bytes = 1073741824
max_msg_size = 65536
discard = "old"
num_replicas = 1
duplicate_window_secs = 120

[[nats.streams]]
name = "MARKET_TICKER_KRAKEN_FUTURES"
subjects = ["market.kraken-futures.*.ticker"]
storage = "memory"
retention = "limits"
max_age_secs = 300
num_replicas = 1

[[nats.streams]]
name = "MARKET_ORDERBOOK_KRAKEN_FUTURES"
subjects = ["market.kraken-futures.*.l2_orderbook"]
storage = "file"
retention = "limits"
max_age_secs = 3600
max_bytes = 5368709120
num_replicas = 1

[[nats.streams]]
name = "MARKET_FUNDING_KRAKEN_FUTURES"
subjects = ["market.kraken-futures.*.funding_rate"]
storage = "file"
retention = "limits"
max_age_secs = 604800
num_replicas = 1

[[nats.streams]]
name = "MARKET_LIQUIDATIONS_KRAKEN_FUTURES"
subjects = ["market.kraken-futures.*.liquidation"]
storage = "file"
retention = "interest"
max_age_secs = 86400
num_replicas = 1

# ── Kraken Futures (USD-margined linear perps) ───────

[[venues]]
id = "kraken-futures"
adapter = "generic_ws"
enabled = true

[venues.connection]
ws_url = "wss://futures.kraken.com/ws/v1"
reconnect_delay_ms = 1000
max_reconnect_delay_ms = 60000
max_reconnect_attempts = 0
ping_interval_secs = 25
pong_timeout_secs = 10

[venues.circuit_breaker]
failure_threshold = 5
reset_timeout_secs = 60
half_open_max_requests = 2

[venues.generic_ws]
# Target shape: per-feed frame with product_ids array.
subscribe_mode = "per_channel"
subscribe_template = '{"event":"subscribe","feed":"${channel}","product_ids":${instruments}}'
stream_format = "${channel}"
message_format = "json"

[venues.generic_ws.channel_map]
trade = "trade"
ticker = "ticker"
l2_orderbook = "book"
# funding_rate is tapped from the ticker feed; the parser must emit both
# a Ticker and a FundingRate envelope when funding fields are present.
funding_rate = "ticker"
# Public liquidations are inferred from trade messages where
# type == "liquidation"; no dedicated feed.
liquidation = "trade"

[[venues.subscriptions]]
instrument = "PF_XBTUSD"
canonical_symbol = "BTC/USD"
data_types = ["trade", "ticker", "l2_orderbook", "funding_rate", "liquidation"]

[[venues.subscriptions]]
instrument = "PF_ETHUSD"
canonical_symbol = "ETH/USD"
data_types = ["trade", "ticker", "l2_orderbook", "funding_rate", "liquidation"]
