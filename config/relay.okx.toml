#
# market2nats — OKX v5 public (spot + SWAP perps)
#
# Parser-tweak profile. OKX v5 subscribes with an array of OBJECTS rather
# than strings:
#
#   {"op":"subscribe","args":[{"channel":"trades","instId":"BTC-USDT"}]}
#
# The current generic_ws adapter only emits an array of strings as
# ${params}. Supporting OKX cleanly requires either:
#
#   (a) adding an "object" args-mode to GenericWsConfig, or
#   (b) extending stream_format to emit JSON-object fragments.
#
# Until that lands this config is the REFERENCE for what the generic
# adapter should produce; running it today will connect and subscribe,
# but OKX will reject the payload. The fix is tracked in the OKX venue
# issue.
#
# NATS subjects produced (once the parser tweak is merged):
#   market.okx.btc-usdt.trade
#   market.okx.btc-usdt.ticker
#   market.okx.btc-usdt.l2_orderbook
#   market.okx-swap.btc-usdt.trade
#   market.okx-swap.btc-usdt.ticker
#   market.okx-swap.btc-usdt.l2_orderbook
#   market.okx-swap.btc-usdt.funding_rate
#   market.okx-swap.btc-usdt.liquidation
#   (same for eth-usdt)

[service]
name = "market2nats-okx"
log_level = "info"
log_format = "json"
shutdown_timeout_ms = 5000

[serialization]
format = "json"

[nats]
urls = ["${NATS_URL:-nats://localhost:4222}"]
connect_timeout_ms = 5000
reconnect_buffer_size = 8388608
max_reconnects = -1
ping_interval_secs = 20
auth = "userpass"
username = "${NATS_USER}"
password = "${NATS_PASSWORD}"

[nats.tls]
enabled = false

# ── Streams ──────────────────────────────────

[[nats.streams]]
name = "MARKET_TRADES"
subjects = ["market.okx.*.trade", "market.okx-swap.*.trade"]
storage = "file"
retention = "limits"
max_age_secs = 86400
max_bytes = 1073741824
max_msg_size = 65536
discard = "old"
num_replicas = 1
duplicate_window_secs = 120

[[nats.streams]]
name = "MARKET_TICKER_OKX"
subjects = ["market.okx.*.ticker", "market.okx-swap.*.ticker"]
storage = "memory"
retention = "limits"
max_age_secs = 300
num_replicas = 1

[[nats.streams]]
name = "MARKET_ORDERBOOK_OKX"
subjects = ["market.okx.*.l2_orderbook", "market.okx-swap.*.l2_orderbook"]
storage = "file"
retention = "limits"
max_age_secs = 3600
max_bytes = 5368709120
num_replicas = 1

[[nats.streams]]
name = "MARKET_FUNDING_OKX"
subjects = ["market.okx-swap.*.funding_rate"]
storage = "file"
retention = "limits"
max_age_secs = 604800
num_replicas = 1

[[nats.streams]]
name = "MARKET_LIQUIDATIONS_OKX"
subjects = ["market.okx-swap.*.liquidation"]
storage = "file"
retention = "interest"
max_age_secs = 86400
num_replicas = 1

# ── OKX Spot ─────────────────────────────────

[[venues]]
id = "okx"
adapter = "generic_ws"
enabled = true

[venues.connection]
ws_url = "wss://ws.okx.com:8443/ws/v5/public"
reconnect_delay_ms = 1000
max_reconnect_delay_ms = 60000
max_reconnect_attempts = 0
ping_interval_secs = 25
pong_timeout_secs = 10

[venues.circuit_breaker]
failure_threshold = 5
reset_timeout_secs = 60
half_open_max_requests = 2

[venues.generic_ws]
batch_subscribe_template = '{"op":"subscribe","args":${params}}'
args_format = "object"
stream_format = '{"channel":"${channel}","instId":"${instrument}"}'
message_format = "json"

[venues.generic_ws.channel_map]
trade = "trades"
ticker = "tickers"
l2_orderbook = "books"

[[venues.subscriptions]]
instrument = "BTC-USDT"
canonical_symbol = "BTC/USDT"
data_types = ["trade", "ticker", "l2_orderbook"]

[[venues.subscriptions]]
instrument = "ETH-USDT"
canonical_symbol = "ETH/USDT"
data_types = ["trade", "ticker", "l2_orderbook"]

# ── OKX SWAP (linear USDT perps) ─────────────

[[venues]]
id = "okx-swap"
adapter = "generic_ws"
enabled = true

[venues.connection]
ws_url = "wss://ws.okx.com:8443/ws/v5/public"
reconnect_delay_ms = 1000
max_reconnect_delay_ms = 60000
max_reconnect_attempts = 0
ping_interval_secs = 25
pong_timeout_secs = 10

[venues.circuit_breaker]
failure_threshold = 5
reset_timeout_secs = 60
half_open_max_requests = 2

[venues.generic_ws]
batch_subscribe_template = '{"op":"subscribe","args":${params}}'
args_format = "object"
stream_format = '{"channel":"${channel}","instId":"${instrument}"}'
message_format = "json"

[venues.generic_ws.channel_map]
trade = "trades"
ticker = "tickers"
l2_orderbook = "books"
funding_rate = "funding-rate"
# NOTE: OKX liquidation-orders subscribes by instType, not instId.
# Requires the parser tweak to emit {"channel":"liquidation-orders","instType":"SWAP"}.
liquidation = "liquidation-orders"

[[venues.subscriptions]]
instrument = "BTC-USDT-SWAP"
canonical_symbol = "BTC/USDT"
data_types = ["trade", "ticker", "l2_orderbook", "funding_rate", "liquidation"]

[[venues.subscriptions]]
instrument = "ETH-USDT-SWAP"
canonical_symbol = "ETH/USDT"
data_types = ["trade", "ticker", "l2_orderbook", "funding_rate", "liquidation"]
